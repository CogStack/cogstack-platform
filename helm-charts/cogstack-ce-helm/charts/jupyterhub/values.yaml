# Default values for the community jupyterhub helm chart
jupyterhub:
  hub:
    image:
        # -- Image repository for the JupyterHub hub.
      name: cogstacksystems/jupyter-hub
      # -- Image tag for the JupyterHub hub.
      tag: "2.2.2"
      # -- Pull policy for the JupyterHub hub.
      pullPolicy: IfNotPresent
    extraConfig:
      00-log-level: |
        c.Application.log_level = 'DEBUG'
    config:
      JupyterHub:
        authenticator_class: dummy
      Authenticator:
        admin_users:
          - admin
      DummyAuthenticator:
        password: "SuperSecret"

      KubeSpawner:
        uid: 0
        fs_gid: 0
        start_timeout: 300
        http_timeout: 120
        notebook_dir: /home/jovyan/work

      Spawner:
        default_url: /lab/
        notebook_dir: /home/jovyan/work

    # -- Extra hub configuration for custom spawner settings
    extraConfig:
      00-custom-spawner: |
        # Custom environment variables for user pods
        c.KubeSpawner.environment = {
            'GRANT_SUDO': '1',
            'CHOWN_HOME': 'yes',
            'CHOWN_HOME_OPTS': '-R',
        }
        # Allow root in notebooks
        c.KubeSpawner.args = ['--allow-root']
  proxy:
    service:
      type: ClusterIP

  singleuser:
    image:
      name: cogstacksystems/jupyter-singleuser
      tag: "2.2.2"
      pullPolicy: IfNotPresent
    lifecycleHooks:
      # -- Lifecycle hook to copy notebooks from image to PVC on first run
      postStart:
        exec:
          command:
            - "sh"
            - "-c"
            - >
              if [ ! -f /home/jovyan/work/.notebooks_initialized ]; then
                echo "First run - copying notebooks and medcat-scripts...";
                cp -r /srv/jupyterhub/notebooks/* /home/jovyan/work/;
                cp -r /srv/jupyterhub/medcat-scripts /home/jovyan/work/;
                touch /home/jovyan/work/.notebooks_initialized;
                echo "Notebooks initialized successfully";
              else
                echo "Notebooks already initialized - skipping";
              fi
    networkPolicy:
      enabled: false 
    startTimeout: 600 # Give 10 minutes to start the container, which includes pulling the image.
    # User pod configuration
    uid: 0
    fsGid: 0
    cmd: ["jupyterhub-singleuser"]

    # -- Extra arguments passed to jupyterhub-singleuser
    extraPodConfig:
      securityContext:
        runAsUser: 0
        runAsGroup: 0

    storage:
      # -- Capacity of the storage for the user pods.
      capacity: 5Gi
      # -- NOTE: Prefer dictionary-form here to avoid Helm merge issues
      # when this subchart is configured by a parent chart.
      extraVolumes:
        jupyter-examples:
          name: jupyter-examples
          configMap:
            name: jupyter-examples
      extraVolumeMounts:
        jupyter-examples:
          name: jupyter-examples
          mountPath: /home/jovyan/work/examples
          readOnly: true
  cull:
    # -- Enable culling of user pods
    # @default -- false, so pods stay running indefinitely
    enabled: false
  scheduling:
    userScheduler:
      replicas: 1
  prePuller:
    # -- Enable pulling the singleuser image before they are used to improve startup time
    hook:
      enabled: false
    continuous:
      enabled: false